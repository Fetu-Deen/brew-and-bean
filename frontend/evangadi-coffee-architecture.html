<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evangadi Coffee Shop — Event-Driven Architecture on AWS</title>
<style>
  :root{
    --espresso:#4a3225; --coffee:#6f4e37; --cream:#f5f1eb; --paper:#fffdf9;
    --amber:#f59e0b; --blue:#2563eb; --green:#16a34a; --ink:#2b1d14;
    --muted:#8a7766;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--cream);
    font-family:'Avenir Next','Segoe UI','Helvetica Neue',Arial,sans-serif;
    color:var(--ink);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    background:linear-gradient(90deg,var(--espresso),var(--coffee));
    color:var(--cream);
    display:flex; align-items:center; gap:18px;
    padding:14px 28px; flex:0 0 auto;
  }
  header .cup{font-size:26px;}
  header h1{font-size:21px; font-weight:700; letter-spacing:.3px;}
  header .sub{font-size:12.5px; opacity:.85; margin-top:2px; letter-spacing:.4px;}
  header .spacer{flex:1;}
  button{
    font-family:inherit; font-size:14.5px; font-weight:700;
    border:none; border-radius:999px; padding:10px 22px; cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
  }
  button:active{transform:scale(.97);}
  #playBtn{background:var(--amber); color:#3b2a12; box-shadow:0 3px 10px rgba(0,0,0,.25);}
  #playBtn:hover{box-shadow:0 5px 16px rgba(0,0,0,.3);}
  #resetBtn{background:rgba(255,255,255,.14); color:var(--cream); margin-left:10px;}
  #resetBtn:hover{background:rgba(255,255,255,.24);}
  button:disabled{opacity:.45; cursor:default;}
  main{flex:1; display:flex; align-items:center; justify-content:center; padding:10px 14px; min-height:0;}
  svg{width:100%; height:100%; display:block;}

  /* ---- SVG styling ---- */
  text{font-family:'Avenir Next','Segoe UI','Helvetica Neue',Arial,sans-serif;}
  .tile{fill:var(--paper); stroke:#e4dccf; stroke-width:1.5; rx:16;
        filter:drop-shadow(0 3px 6px rgba(74,50,37,.10));}
  .tile-name{font-size:19px; font-weight:700; fill:var(--ink);}
  .tile-res{font-size:14px; fill:var(--muted); font-weight:600;}
  .tile-note{font-size:12.5px; fill:var(--muted);}
  .icon{font-size:30px;}
  .boundary{fill:rgba(111,78,55,.045); stroke:var(--coffee); stroke-width:2.5; rx:20;}
  .az{fill:rgba(245,158,11,.05); stroke:#d9b98c; stroke-width:1.6; stroke-dasharray:7 5; rx:14;}
  .bound-label{font-size:17px; font-weight:800; fill:var(--coffee); letter-spacing:.4px;}
  .az-label{font-size:14px; font-weight:800; fill:#a07a3c;}
  .az-sub{font-size:12.5px; fill:#a07a3c;}
  .flow{fill:none; stroke:#b9a68f; stroke-width:2.6; marker-end:url(#arr);}
  .flow-dash{fill:none; stroke:#b9a68f; stroke-width:2.4; stroke-dasharray:8 6; marker-end:url(#arr);}
  .flow-label{font-size:13px; font-weight:700; fill:#7a6450;}
  .headline{font-size:22px; font-weight:800; fill:var(--espresso); font-style:italic;}
  .lane-title{font-size:15.5px; font-weight:800; letter-spacing:.5px;}
  .badge{fill:#fff; stroke:#e0d6c6; stroke-width:1.2; rx:999;}
  .badge-text{font-size:12.5px; font-weight:600; fill:#6e5a47;}
  .legend-title{font-size:13px; font-weight:800; fill:var(--muted); letter-spacing:1.2px;}

  /* lane accents */
  .laneA{stroke:var(--coffee);} .accA{fill:var(--coffee);}
  .laneB{stroke:var(--blue);}   .accB{fill:var(--blue);}
  .laneC{stroke:var(--green);}  .accC{fill:var(--green);}
  .laneD{stroke:var(--amber);}  .accD{fill:var(--amber);}
  .lane-flow{fill:none; stroke-width:2.8; opacity:.85;}

  /* animation states */
  .lit-A rect{stroke:var(--coffee); stroke-width:3; filter:drop-shadow(0 0 12px rgba(111,78,55,.65));}
  .lit-B rect{stroke:var(--blue);   stroke-width:3; filter:drop-shadow(0 0 12px rgba(37,99,235,.6));}
  .lit-C rect{stroke:var(--green);  stroke-width:3; filter:drop-shadow(0 0 12px rgba(22,163,74,.6));}
  .lit-D rect{stroke:var(--amber);  stroke-width:3; filter:drop-shadow(0 0 12px rgba(245,158,11,.7));}
  .lit-A rect,.lit-B rect,.lit-C rect,.lit-D rect{transition:all .35s ease;}
  .tile-g rect{transition:all .35s ease;}
  .flash{font-size:15px; font-weight:800; opacity:0; transition:opacity .25s ease;}
  .flash.on{opacity:1;}
  #caption{font-size:24px; font-weight:800; fill:var(--espresso); font-style:italic;
           opacity:0; transition:opacity .9s ease;}
  #caption.on{opacity:1;}
  .pulse-core{fill:#fff;}
  .pulse-glow{fill:var(--amber); opacity:.45;}
  @media (prefers-reduced-motion: reduce){
    .lit-A rect,.lit-B rect,.lit-C rect,.lit-D rect,.tile-g rect,.flash,#caption{transition:none;}
  }
</style>
</head>

  <div class="spacer"></div>

    <text class="tile-res" x="2140" y="826" font-size="11.5">coffee-recommendations</text>
  </g>

  <!-- ======================= LEGEND ======================= -->
  <text class="legend-title" x="48" y="845">CROSS-CUTTING</text>
  <rect class="badge" x="40" y="862" width="330" height="32" rx="16"/>
  <text class="badge-text" x="58" y="883">📍 Region us-west-2 · Bedrock invoked in us-east-1</text>
  <rect class="badge" x="40" y="902" width="330" height="32" rx="16"/>
  <text class="badge-text" x="58" y="923">🔐 Least-privilege IAM — bb-* roles</text>
  <rect class="badge" x="40" y="942" width="330" height="32" rx="16"/>
  <text class="badge-text" x="58" y="963">📝 CloudWatch Logs on every Lambda</text>
  <rect class="badge" x="385" y="862" width="280" height="32" rx="16"/>
  <text class="badge-text" x="403" y="883">📣 SNS → SQS · Raw Delivery OFF</text>

  <!-- ======================= ANIMATION LAYER ======================= -->
  <text id="caption" x="1880" y="965" text-anchor="middle">One event → four reactions, in parallel.</text>
  <g id="pulseLayer"></g>
</svg>
</main>

<script>
(function(){
  const svgns = "http://www.w3.org/2000/svg";
  const $ = id => document.getElementById(id);
  const pulseLayer = $("pulseLayer");
  const playBtn = $("playBtn"), resetBtn = $("resetBtn");
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  let playing = false;

  const LANES = [
    {guide:"gA", cls:"lit-A", color:"#6f4e37", dests:["tDestA"]},
    {guide:"gB", cls:"lit-B", color:"#2563eb", dests:["tDestB"]},
    {guide:"gC", cls:"lit-C", color:"#16a34a", dests:["tS3C","tGlueC","tAthC"]},
    {guide:"gD", cls:"lit-D", color:"#f59e0b", dests:["tBedD","tDdbD"]}
  ];

  function makePulse(color){
    const g = document.createElementNS(svgns,"g");
    const glow = document.createElementNS(svgns,"circle");
    glow.setAttribute("r","16"); glow.setAttribute("fill",color); glow.setAttribute("opacity","0.4");
    const core = document.createElementNS(svgns,"circle");
    core.setAttribute("r","7"); core.setAttribute("fill","#fff");
    core.setAttribute("stroke",color); core.setAttribute("stroke-width","3");
    g.appendChild(glow); g.appendChild(core);
    pulseLayer.appendChild(g);
    return g;
  }

  function travel(pulse, path, duration){
    return new Promise(resolve=>{
      const len = path.getTotalLength();
      const start = performance.now();
      function frame(now){
        let t = Math.min((now - start)/duration, 1);
        // ease in-out
        const e = t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
        const pt = path.getPointAtLength(e*len);
        pulse.setAttribute("transform", "translate("+pt.x+","+pt.y+")");
        if(t < 1) requestAnimationFrame(frame); else resolve();
      }
      requestAnimationFrame(frame);
    });
  }

  function flash(id, ms){
    const el = $(id); el.classList.add("on");
    setTimeout(()=>el.classList.remove("on"), ms);
  }

  function lightUp(lane, idx, count){
    lane.dests.forEach((d,i)=>{
      // stagger chained destinations slightly
      setTimeout(()=> $(d).classList.add(lane.cls), i*180);
    });
  }

  function clearAll(){
    pulseLayer.innerHTML = "";
    $("caption").classList.remove("on");
    $("wafFlash").classList.remove("on");
    $("snsFlash").classList.remove("on");
    LANES.forEach(l => l.dests.forEach(d => $(d).classList.remove(l.cls)));
  }

  async function play(){
    if(playing) return;
    playing = true; playBtn.disabled = true;
    clearAll();

    if(reduced){
      // No motion: simply highlight the end state.
      flash("wafFlash", 4000); flash("snsFlash", 4000);
      LANES.forEach(l => lightUp(l));
      $("caption").classList.add("on");
      playing = false; playBtn.disabled = false;
      return;
    }

    const pulse = makePulse("#f59e0b");

    await travel(pulse, $("p1"), 420);          // browser -> WAF
    flash("wafFlash", 1200);
    await travel(pulse, $("p2"), 420);          // WAF -> IGW
    await travel(pulse, $("p3"), 320);          // IGW -> ALB
    await travel(pulse, $("p4"), 420);          // ALB -> Fargate
    await travel(pulse, $("p5"), 520);          // Fargate -> SNS
    flash("snsFlash", 1400);
    pulse.remove();

    await new Promise(r=>setTimeout(r,180));

    // fan out: 4 pulses simultaneously
    const runs = LANES.map(lane=>{
      const p = makePulse(lane.color);
      return travel(p, $(lane.guide), 1900).then(()=>{
        lightUp(lane);
        p.remove();
      });
    });
    await Promise.all(runs);

    $("caption").classList.add("on");
    playing = false; playBtn.disabled = false;
  }

  playBtn.addEventListener("click", play);
  resetBtn.addEventListener("click", ()=>{ if(!playing) clearAll(); });
})();
</script>
</body>
</html>
