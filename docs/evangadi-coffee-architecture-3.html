<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evangadi Coffee Shop — Event-Driven Architecture on AWS</title>
<style>
  :root{
    --ink:#232F3E; --sub:#5f6b7a; --awsorange:#FF9900;
    --purple:#8C4FFF; --green:#7AA116; --pink:#E7157B;
    --magenta:#C925D1; --teal:#01A88D; --red:#DD344C; --orange:#ED7100;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:#fff;
    font-family:'Amazon Ember','Segoe UI','Helvetica Neue',Arial,sans-serif;
    color:var(--ink);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    background:var(--ink); color:#fff;
    display:flex; align-items:center; gap:18px;
    padding:13px 28px; flex:0 0 auto;
  }
  header .cup{font-size:25px;}
  header h1{font-size:21px; font-weight:700; letter-spacing:.3px;}
  header .subt{font-size:12.5px; opacity:.8; margin-top:2px; letter-spacing:.4px;}
  header .spacer{flex:1;}
  button{
    font-family:inherit; font-size:14.5px; font-weight:700;
    border:none; border-radius:999px; padding:10px 22px; cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
  }
  button:active{transform:scale(.97);}
  #playBtn{background:var(--awsorange); color:#232F3E; box-shadow:0 3px 10px rgba(0,0,0,.3);}
  #playBtn:hover{box-shadow:0 5px 16px rgba(0,0,0,.4);}
  #resetBtn{background:rgba(255,255,255,.14); color:#fff; margin-left:10px;}
  #resetBtn:hover{background:rgba(255,255,255,.26);}
  button:disabled{opacity:.45; cursor:default;}
  main{flex:1; display:flex; align-items:center; justify-content:center; padding:8px 12px; min-height:0;}
  svg{width:100%; height:100%; display:block;}

  /* ---- SVG styling ---- */
  text{font-family:'Amazon Ember','Segoe UI','Helvetica Neue',Arial,sans-serif;}
  .lbl{font-size:17px; font-weight:700; fill:var(--ink);}
  .sub2{font-size:14px; fill:var(--sub); font-weight:600;}
  .lane-title{font-size:17px; font-weight:800; fill:var(--ink); letter-spacing:.6px;}
  .frame{fill:none; stroke:var(--ink); stroke-width:2.2;}
  .vpc-box{fill:none; stroke:var(--purple); stroke-width:2.4;}
  .vpc-lbl{font-size:17px; font-weight:800; fill:var(--purple);}
  .subnet{fill:rgba(122,161,22,.04); stroke:var(--green); stroke-width:1.8; stroke-dasharray:7 5;}
  .subnet-lbl{font-size:14px; font-weight:700; fill:var(--green);}
  .flow{fill:none; stroke:var(--ink); stroke-width:2.3; marker-end:url(#arr);}
  .flow-dash{fill:none; stroke:var(--ink); stroke-width:2.1; stroke-dasharray:8 6; marker-end:url(#arr);}
  .flow-label{font-size:14px; font-weight:700; fill:var(--sub);}
  .headline{font-size:24px; font-weight:800; fill:var(--ink); font-style:italic;}
  .glyph{stroke:#fff; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round;}
  .dark-glyph{stroke:var(--ink); stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round;}
  .step{fill:var(--ink);}
  .step-n{font-size:16px; font-weight:800; fill:#fff;}
  .note{font-size:13px; fill:var(--sub); font-weight:600;}

  .icon-g{transition:filter .35s ease;}
  .lit-A{filter:drop-shadow(0 0 14px rgba(201,37,209,.85));}
  .lit-B{filter:drop-shadow(0 0 14px rgba(231,21,123,.85));}
  .lit-C{filter:drop-shadow(0 0 14px rgba(108,174,62,.95));}
  .lit-D{filter:drop-shadow(0 0 14px rgba(1,168,141,.95));}
  .flash{font-size:16px; font-weight:800; opacity:0; transition:opacity .25s ease;}
  .flash.on{opacity:1;}
  .fl-green{fill:var(--green);} .fl-orange{fill:var(--awsorange);}
  #caption{font-size:26px; font-weight:800; fill:var(--ink); font-style:italic;
           opacity:0; transition:opacity .9s ease;}
  #caption.on{opacity:1;}
  @media (prefers-reduced-motion: reduce){
    .icon-g,.flash,#caption{transition:none;}
  }
</style>
</head>

      <circle cx="40" cy="30" r="7"/>

      <ellipse cx="40" cy="24" rx="19" ry="7"/>

<script>
(function(){
  const svgns = "http://www.w3.org/2000/svg";
  const $ = id => document.getElementById(id);
  const pulseLayer = $("pulseLayer");
  const playBtn = $("playBtn"), resetBtn = $("resetBtn");
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  let playing = false;

  const LANES = [
    {guide:"gA", cls:"lit-A", color:"#C925D1", dests:["tDestA"]},
    {guide:"gB", cls:"lit-B", color:"#E7157B", dests:["tDestB"]},
    {guide:"gC", cls:"lit-C", color:"#6CAE3E", dests:["tS3C","tGlueC","tAthC"]},
    {guide:"gD", cls:"lit-D", color:"#01A88D", dests:["tBedD","tDdbD"]}
  ];

  function makePulse(color){
    const g = document.createElementNS(svgns,"g");
    const glow = document.createElementNS(svgns,"circle");
    glow.setAttribute("r","16"); glow.setAttribute("fill",color); glow.setAttribute("opacity","0.4");
    const core = document.createElementNS(svgns,"circle");
    core.setAttribute("r","7"); core.setAttribute("fill","#fff");
    core.setAttribute("stroke",color); core.setAttribute("stroke-width","3");
    g.appendChild(glow); g.appendChild(core);
    pulseLayer.appendChild(g);
    return g;
  }

  function travel(pulse, path, duration){
    return new Promise(resolve=>{
      const len = path.getTotalLength();
      const start = performance.now();
      function frame(now){
        let t = Math.min((now - start)/duration, 1);
        const e = t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; // ease in-out
        const pt = path.getPointAtLength(e*len);
        pulse.setAttribute("transform", "translate("+pt.x+","+pt.y+")");
        if(t < 1) requestAnimationFrame(frame); else resolve();
      }
      requestAnimationFrame(frame);
    });
  }

  function flash(id, ms){
    const el = $(id); el.classList.add("on");
    setTimeout(()=>el.classList.remove("on"), ms);
  }

  function lightUp(lane){
    lane.dests.forEach((d,i)=>{
      setTimeout(()=> $(d).classList.add(lane.cls), i*180);
    });
  }

  function clearAll(){
    pulseLayer.innerHTML = "";
    $("caption").classList.remove("on");
    $("wafFlash").classList.remove("on");
    $("snsFlash").classList.remove("on");
    LANES.forEach(l => l.dests.forEach(d => $(d).classList.remove(l.cls)));
  }

  async function play(){
    if(playing) return;
    playing = true; playBtn.disabled = true;
    clearAll();

    if(reduced){
      flash("wafFlash", 4000); flash("snsFlash", 4000);
      LANES.forEach(l => lightUp(l));
      $("caption").classList.add("on");
      playing = false; playBtn.disabled = false;
      return;
    }

    const pulse = makePulse("#FF9900");

    await travel(pulse, $("p1"), 420);          // browser -> WAF
    flash("wafFlash", 1200);
    await travel(pulse, $("p2"), 420);          // WAF -> IGW
    await travel(pulse, $("p3"), 360);          // IGW -> ALB
    await travel(pulse, $("p4"), 420);          // ALB -> Fargate
    await travel(pulse, $("p5"), 520);          // Fargate -> SNS
    flash("snsFlash", 1400);
    pulse.remove();

    await new Promise(r=>setTimeout(r,180));

    const runs = LANES.map(lane=>{
      const p = makePulse(lane.color);
      return travel(p, $(lane.guide), 1900).then(()=>{
        lightUp(lane);
        p.remove();
      });
    });
    await Promise.all(runs);

    $("caption").classList.add("on");
    playing = false; playBtn.disabled = false;
  }

  playBtn.addEventListener("click", play);
  resetBtn.addEventListener("click", ()=>{ if(!playing) clearAll(); });
})();
</script>
